# RBAC for the ippon API / worker — granted only what the K8sJobRunner
# needs to create / observe / clean up scan jobs:
#
#   - jobs   : create + read + delete (the Job itself + its status)
#   - pods   : read (to surface init container failure reasons)
#   - secrets: create + read + delete (per-job HMAC secret, lifecycled
#              alongside the Job via ownerReferences)
#
# Everything is namespace-scoped (``ippon-scans``) — no ClusterRole,
# no cross-namespace reach.
#
# NetworkPolicies, PodSecurityPolicies (or Pod Security Admission
# labels), and OPA/Gatekeeper constraints are deliberately omitted —
# they're part of the Helm chart packaging (out of scope here).
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ippon-scanner
  namespace: ippon-scans
  labels:
    app.kubernetes.io/name: ippon
    app.kubernetes.io/component: scanner
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ippon-scanner
  namespace: ippon-scans
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ippon-scanner
  namespace: ippon-scans
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ippon-scanner
subjects:
  - kind: ServiceAccount
    name: ippon-scanner
    namespace: ippon-scans
