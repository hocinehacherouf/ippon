name: ippon

# Local development stack:
#   - postgres        OLTP (orgs, users, repos, scan_jobs, webhook_deliveries)
#   - clickhouse      OLAP (sboms, dependencies, findings, vex_statements)
#   - valkey          Celery broker + result backend
#   - rustfs          S3-compatible object store for CycloneDX blobs
#   - grype-db-updater one-shot: hydrates the shared grype DB volume
#
# Production runs scan jobs as Kubernetes Jobs; this compose stack provides
# only the dependencies the API + workers + scan-job containers connect to.
#
# Every base image is digest-pinned (sha256). Dependabot's docker-compose
# ecosystem keeps both the tag and the digest fresh.

services:
  postgres:
    image: postgres:18-alpine@sha256:96d56f7f57c6aacd1fcb908bc83b345ec5f83231ee486dd66a1baadce274db88
    container_name: ippon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ippon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-ippon}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ippon} -d ${POSTGRES_DB:-ippon}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine@sha256:82499fdb60e5bfaefb1e8f06f00a8857d61643fd6081c3f476ab6c7ff6d78766
    container_name: ippon-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-ippon}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:?set in .env}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-ippon}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          clickhouse-client --user ${CLICKHOUSE_USER:-ippon}
          --password ${CLICKHOUSE_PASSWORD:?set in .env}
          --query "SELECT 1" || exit 1
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

  valkey:
    image: valkey/valkey:9-alpine@sha256:a35428eba9043cc0b79dbe54100f0c92784f2de00ad09b01182bfb1c5c83d1bd
    container_name: ippon-valkey
    restart: unless-stopped
    command: ["valkey-server", "--appendonly", "yes"]
    ports:
      - "${VALKEY_PORT:-6379}:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  rustfs:
    image: rustfs/rustfs:1.0.0-beta.4@sha256:f7cb98ef492fa3c3ed0dbd65df3ce2dd205c666e24e7d7234d9402c9ed1001f9
    container_name: ippon-rustfs
    restart: unless-stopped
    environment:
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:?set RUSTFS_ACCESS_KEY in .env}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:?set RUSTFS_SECRET_KEY in .env}
    ports:
      - "${RUSTFS_S3_PORT:-9100}:9000"
      - "${RUSTFS_CONSOLE_PORT:-9101}:9001"
    volumes:
      - rustfs_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  # --- ClickHouse admin UI ----------------------------------------------
  # Browser-based query editor for the analytical store. Local-dev only —
  # not exposed beyond the host. Credentials are typed into the browser
  # at first launch (form fields are: URL=http://clickhouse:8123, user
  # and password from .env, database=ippon).
  ch-ui:
    image: ghcr.io/caioricciuti/ch-ui:v2.2.0@sha256:795c2f2914966a9a21b1312bfe306d76c33e52fd7aba0e164f72ed0b6c1308ff
    container_name: ippon-ch-ui
    restart: unless-stopped
    depends_on:
      clickhouse: { condition: service_healthy }
    environment:
      # Server-side default target only — no credentials. The user
      # supplies them in the browser form on first load.
      CLICKHOUSE_URL: http://clickhouse:8123
    ports:
      - "${CH_UI_PORT:-13488}:3488"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3488/"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  # --- API ---------------------------------------------------------------
  # The api / worker-general / worker-scan / beat services all share one
  # image (ippon/backend:dev) built from docker/backend.Dockerfile. Each
  # service supplies its full ``command:`` since the image has no
  # ENTRYPOINT/CMD.
  api:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    image: ippon/backend:dev
    container_name: ippon-api
    depends_on:
      postgres: { condition: service_healthy }
      clickhouse: { condition: service_healthy }
      valkey: { condition: service_healthy }
      rustfs: { condition: service_healthy }
    env_file: [.env]
    environment: &api-env-overrides
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-ippon}:${POSTGRES_PASSWORD:?set in .env}@postgres:5432/${POSTGRES_DB:-ippon}
      CLICKHOUSE_URL: http://${CLICKHOUSE_USER:-ippon}:${CLICKHOUSE_PASSWORD:?set in .env}@clickhouse:8123/${CLICKHOUSE_DB:-ippon}
      VALKEY_URL: redis://valkey:6379/0
      S3_ENDPOINT_URL: http://rustfs:9000
      CALLBACK_BASE_URL: http://api:8000
    command: ["uvicorn", "ippon.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # --- Frontend ----------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      target: dev
    image: ippon/web:dev
    container_name: ippon-web
    depends_on:
      api: { condition: service_healthy }
    environment:
      # The dev server's Vite proxy forwards /api/* to the in-network API.
      # IPPON_PROXY_TARGET is read in vite.config.ts (Node-side).
      # VITE_* vars are inlined into the browser bundle.
      IPPON_PROXY_TARGET: http://api:8000
      VITE_API_BASE_URL: /api
      VITE_IPPON_DEV_TOKEN: ${IPPON_DEV_TOKEN:?set in .env}
    ports:
      - "5173:5173"
    # Mount source over the image so HMR reflects host edits. node_modules
    # stays in the image; mounted volume just overlays the editable bits.
    volumes:
      - ./web:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:5173/"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # --- Celery: workers + beat -------------------------------------------
  worker-general:
    image: ippon/backend:dev
    container_name: ippon-worker-general
    depends_on:
      api: { condition: service_started }
      valkey: { condition: service_healthy }
      postgres: { condition: service_healthy }
      clickhouse: { condition: service_healthy }
      grype-db-updater: { condition: service_completed_successfully }
    env_file: [.env]
    environment: &worker-env-overrides
      # Override host-side URLs with the in-network ones.
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-ippon}:${POSTGRES_PASSWORD:?set in .env}@postgres:5432/${POSTGRES_DB:-ippon}
      CLICKHOUSE_URL: http://${CLICKHOUSE_USER:-ippon}:${CLICKHOUSE_PASSWORD:?set in .env}@clickhouse:8123/${CLICKHOUSE_DB:-ippon}
      VALKEY_URL: redis://valkey:6379/0
      S3_ENDPOINT_URL: http://rustfs:9000
      CALLBACK_BASE_URL: http://api:8000
      SCAN_JOB_NETWORK: ippon_default
    command:
      - celery
      - -A
      - ippon.worker.celery_app:celery_app
      - worker
      - --loglevel=INFO
      - --queues=general
      - --concurrency=2
      - --hostname=general@%h
    restart: unless-stopped

  worker-scan:
    image: ippon/backend:dev
    container_name: ippon-worker-scan
    depends_on:
      worker-general: { condition: service_started }
      valkey: { condition: service_healthy }
      postgres: { condition: service_healthy }
      clickhouse: { condition: service_healthy }
    env_file: [.env]
    environment:
      <<: *worker-env-overrides
    # The scan worker uses the host docker daemon (via DockerJobRunner /
    # aiodocker) to spawn the scan-job container chain. The Wolfi image
    # runs as uid 1000 (appuser); adding gid 0 lets the process reach the
    # forwarded docker.sock (which Docker Desktop / most distros own as
    # root:root). The application still runs as a non-root user — only
    # the secondary group is widened.
    group_add:
      - "0"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - grype_db:/grype-db:ro
    command:
      - celery
      - -A
      - ippon.worker.celery_app:celery_app
      - worker
      - --loglevel=INFO
      - --queues=scan
      - --concurrency=4
      - --hostname=scan@%h
    restart: unless-stopped

  beat:
    image: ippon/backend:dev
    container_name: ippon-beat
    depends_on:
      worker-general: { condition: service_started }
      valkey: { condition: service_healthy }
    env_file: [.env]
    environment:
      <<: *worker-env-overrides
    command:
      - celery
      - -A
      - ippon.worker.celery_app:celery_app
      - beat
      - --loglevel=INFO
    restart: unless-stopped

  # One-shot: hydrates the grype CVE DB into a named volume that scan-job
  # containers will mount read-only. Re-run with `just db-update` or simply
  # `docker compose run --rm grype-db-updater`.
  grype-db-updater:
    image: anchore/grype:latest@sha256:391bfda62888fb4e98ff5c4c81598f7431a3c1eac3f8519d69d1ff00df247c1d
    container_name: ippon-grype-db-updater
    restart: "no"
    environment:
      GRYPE_DB_CACHE_DIR: /grype-db
    command: ["db", "update"]
    volumes:
      - grype_db:/grype-db

volumes:
  postgres_data:
  clickhouse_data:
  clickhouse_logs:
  valkey_data:
  rustfs_data:
  grype_db:
